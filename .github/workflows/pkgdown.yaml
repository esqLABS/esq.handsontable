# Build the pkgdown site (vignettes as articles + function reference)
# and publish to GitHub Pages.
#
# Prerequisites in the repo settings:
#   Settings → Pages → Source: "Deploy from a branch" → branch "gh-pages" / root
# The first run will create the gh-pages branch automatically.

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
  workflow_dispatch:

name: pkgdown

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.ACTIONS_PAT }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACTIONS_PAT }}

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.ACTIONS_PAT }}
          clean: false
          branch: gh-pages
          folder: docs
